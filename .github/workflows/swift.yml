name: Build REAL IPA (10MB+)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: Fix Syntax
        run: sed -i.bak 's/,\s*)\s*$/)/g' Chowder/Chowder/Models/ChowderActivityAttributes.swift

      - name: Build Everything
        run: |
          # Use standard build, Release configuration, and disable code signing so it doesn't fail on missing certs
          xcodebuild clean build \
            -project Chowder/Chowder.xcodeproj \
            -scheme Chowder \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0

      - name: Package COMPLETE App
        run: |
          mkdir -p Payload
          
          # Copy the actual built app directly from Xcode's predictable output path
          # If Xcode built extensions, they are already inside PlugIns/ inside this .app bundle
          cp -R build/Build/Products/Release-iphoneos/Chowder.app Payload/
          
          # Zip it up into an IPA
          zip -r Chowder-FULL.ipa Payload
          
          # Verify sizes
          ls -lh Chowder-FULL.ipa
          du -sh Payload/Chowder.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Chowder-FULL-IPA
          path: Chowder-FULL.ipa
