name: PERFECT Unsigned IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Fix Code & Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          sed -i.bak 's/,\s*)\s*$/)/g' Chowder/Chowder/Models/ChowderActivityAttributes.swift || true

      - name: Build App
        run: |
          mkdir -p build
          xcodebuild build \
            -project Chowder/Chowder.xcodeproj -scheme Chowder \
            -configuration Debug -destination "generic/platform=iOS" \
            -derivedDataPath build IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            CODE_SIGNING_ALLOWED=NO SWIFT_TREAT_WARNINGS_AS_ERRORS=NO || true

      - name: Create/Fix Info.plist & Package
        run: |
          APP=$(find build -name "Chowder.app" -type d 2>/dev/null | head -1)
          [ -z "$APP" ] && APP=$(find build -name "*.app" | head -1)
          
          echo "Using app: $APP"
          
          # Create proper Info.plist if missing/corrupt
          mkdir -p "$APP"
          cat > "$APP/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>
            <string>com.sifatbhatia.chowder</string>
            <key>CFBundleDisplayName</key>
            <string>Chowder</string>
            <key>CFBundleName</key>
            <string>Chowder</string>
            <key>CFBundleExecutable</key>
            <string>Chowder</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UIApplicationSceneManifest</key>
            <dict>
              <key>UIApplicationSupportsMultipleScenes</key>
              <false/>
            </dict>
          </dict>
          </plist>
          EOF

          mkdir -p Payload && rm -rf Payload/* && cp -r "$APP" Payload/
          zip -r Chowder.ipa Payload
          echo "✅ IPA ready: $(ls -la Chowder.ipa)"

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Chowder-Working-IPA
          path: Chowder.ipa
