name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Unsigned Archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project Chowder/Chowder.xcodeproj \
            -scheme Chowder \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/Chowder.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Chowder.xcarchive/Products/Applications/*.app Payload/
          zip -r Chowder.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chowder-Package
          path: Chowder.ipa
          retention-days: 30
