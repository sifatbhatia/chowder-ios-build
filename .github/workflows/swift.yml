name: iOS Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # This provides the Mac environment you need
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build App
        run: |
          xcodebuild -project Chowder/Chowder.xcodeproj \
                     -scheme Chowder \
                     -sdk iphonesimulator \
                     -destination 'platform=iOS Simulator,name=iPhone 15' \
                     clean build