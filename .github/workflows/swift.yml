name: Fix Bundle ID & Build IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix Swift Syntax
        run: sed -i.bak 's/,\s*)\s*$/)/g' Chowder/Chowder/Models/ChowderActivityAttributes.swift

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: Build App
        run: |
          mkdir -p build
          xcodebuild build -project Chowder/Chowder.xcodeproj -scheme Chowder \
            -configuration Debug -destination "generic/platform=iOS" \
            -derivedDataPath build IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            CODE_SIGNING_ALLOWED=NO SWIFT_TREAT_WARNINGS_AS_ERRORS=NO || true

      - name: Fix Bundle ID & Package
        run: |
          APP=$(find build -name "*.app" | head -1)
          if [ -n "$APP" ]; then
            echo "Fixing $APP bundle ID..."
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.sifatbhatia.chowder" "$APP/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Chowder" "$APP/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0" "$APP/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" "$APP/Info.plist"
            
            mkdir -p Payload && cp -r "$APP" Payload/
            zip -r Chowder.ipa Payload
            echo "IPA created with bundle ID: com.sifatbhatia.chowder"
          else
            exit 1
          fi

      - name: Upload Fixed IPA
        uses: actions/upload-artifact@v4
        with:
          name: Chowder-Fixed-IPA
          path: Chowder.ipa
