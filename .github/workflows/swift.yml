name: Build REAL IPA (10MB+)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: Fix Syntax
        run: sed -i.bak 's/,\s*)\s*$/)/g' Chowder/Chowder/Models/ChowderActivityAttributes.swift || true

      - name: Build Everything
        run: |
          mkdir -p build
          xcodebuild build-for-testing \
            -project Chowder/Chowder.xcodeproj \
            -scheme Chowder \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 || true

      - name: Package COMPLETE App
        run: |
          # Copy ALL built products (main + extensions)
          mkdir -p Payload/Chowder.app
          
          # Main app
          find build -path "*/Debug-iphoneos/Chowder.app" -prune | while read dir; do 
            cp -r "$dir/." Payload/Chowder.app/ || true
          done
          
          # Extensions/Assets
          find build -name "*.app" -type d | grep -v Chowder.app | while read ext; do
            mkdir -p "Payload/Chowder.app/PlugIns/$(basename "$ext")"
            cp -r "$ext/." "Payload/Chowder.app/PlugIns/$(basename "$ext")" || true
          done
          
          # Info.plist
          cat > Payload/Chowder.app/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key><string>com.sifatbhatia.chowder</string>
            <key>CFBundleDisplayName</key><string>Chowder</string>
            <key>CFBundleExecutable</key><string>Chowder</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSRequiresIPhoneOS</key><true/>
          </dict>
          </plist>
          EOF

          zip -r Chowder-FULL.ipa Payload
          ls -lh Chowder-FULL.ipa
          du -sh Payload/Chowder.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Chowder-FULL-IPA
          path: Chowder-FULL.ipa
