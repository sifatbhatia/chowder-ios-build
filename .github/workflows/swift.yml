name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build App
        # CODE_SIGNING_ALLOWED=NO bypasses the need for Apple certs on the runner
        run: |
          xcodebuild build -project Chowder/Chowder.xcodeproj \
                     -scheme Chowder \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Moves the compiled .app into a Payload folder for zipping
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Chowder.ipa Payload

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Chowder-Package
          path: Chowder.ipa