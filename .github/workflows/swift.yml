name: Build REAL IPA (10MB+)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      # I commented this out. Let's see if your raw code compiles without this regex hack.
      # - name: Fix Syntax
      #   run: sed -i.bak 's/,\s*)\s*$/)/g' Chowder/Chowder/Models/ChowderActivityAttributes.swift

      - name: Build Everything (Debug Mode)
        run: |
          # Install xcbeautify to make the logs actually readable
          brew install xcbeautify
          
          # This ensures the GitHub Action fails if xcodebuild fails, even when piped
          set -o pipefail
          
          # Run the build and pipe it into xcbeautify
          xcodebuild clean build \
            -project Chowder/Chowder.xcodeproj \
            -scheme Chowder \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 | xcbeautify

      - name: Package COMPLETE App
        # This will only run if the build step above succeeds
        run: |
          mkdir -p Payload
          
          # Copy the built app directly
          cp -R build/Build/Products/Release-iphoneos/Chowder.app Payload/
          
          # Zip it up
          zip -r Chowder-FULL.ipa Payload
          
          # Check sizes
          ls -lh Chowder-FULL.ipa
          du -sh Payload/Chowder.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Chowder-FULL-IPA
          path: Chowder-FULL.ipa
