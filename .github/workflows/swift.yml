name: Build REAL IPA (10MB+)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # 1. Bump the runner to macOS 26 (Tahoe)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        # 2. Point xcode-select to the newer Xcode 26.2 installation
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Build Everything
        run: |
          brew install xcbeautify
          set -o pipefail
          
          xcodebuild clean build \
            -project Chowder/Chowder.xcodeproj \
            -scheme Chowder \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 | xcbeautify

      - name: Package COMPLETE App
        run: |
          mkdir -p Payload
          
          cp -R build/Build/Products/Release-iphoneos/Chowder.app Payload/
          
          zip -r Chowder-FULL.ipa Payload
          
          ls -lh Chowder-FULL.ipa
          du -sh Payload/Chowder.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Chowder-FULL-IPA
          path: Chowder-FULL.ipa
