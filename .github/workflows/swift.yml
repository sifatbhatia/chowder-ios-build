name: Fix & Build Unsigned IPA

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-Fix Swift Syntax Errors
        run: |
          # Remove trailing commas from ChowderActivityAttributes.swift (lines 61,73,86,99,112,125)
          sed -i.bak 's/),\s*$/)/g' Chowder/Chowder/Models/ChowderActivityAttributes.swift
          sed -i.bak 's/,\s*)\s*$/)/g' Chowder/Chowder/Models/ChowderActivityAttributes.swift
          echo "Fixed trailing commas:"
          grep -n "," Chowder/Chowder/Models/ChowderActivityAttributes.swift | head -10

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer

      - name: Build App (Fixed)
        run: |
          mkdir -p build
          xcodebuild build \
            -project Chowder/Chowder.xcodeproj \
            -scheme Chowder \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO || true

      - name: Package IPA
        run: |
          APP=$(find build -name "*.app" | head -1)
          if [ -n "$APP" ]; then
            mkdir -p Payload && cp -r "$APP" Payload/ && zip -r Chowder.ipa Payload
          else
            echo "No app - listing:" && find build -name "*.app" || true
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Chowder-IPA
          path: Chowder.ipa
