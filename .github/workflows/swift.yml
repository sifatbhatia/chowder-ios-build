name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Xcode version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Build iOS App
      # Point to the .xcodeproj or .xcworkspace inside the 'chawder' folder
      run: |
        xcodebuild -project chawder/Chowder.xcodeproj \
                   -scheme Chowder \
                   -sdk iphonesimulator \
                   -destination 'platform=iOS Simulator,name=iPhone 16e
                   clean build
